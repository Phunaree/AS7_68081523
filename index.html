<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AS7_68081523 Phunaree Phiromrattanapreecha</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    .video-banner {
      position: relative;
      width: 100%;
      height: 400px;
      overflow: hidden;
    }

    .video-banner video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-controls {
      text-align: center;
      margin: 15px 0;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Phunaree Phiromrattanapreecha</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">หน้าแรก</a></li>
        <li class="nav-item"><a class="nav-link" href="#">ข้อมูลบริษัท</a></li>
        <li class="nav-item"><a class="nav-link" href="#">บริการ</a></li>
        <li class="nav-item"><a class="nav-link" href="#">เกี่ยวกับเรา</a></li>
      </ul>
    </div>
  </nav>

  <div class="video-banner">
    <video id="myVideo" muted loop>
      <source src="file Lab 7/242945_small.mp4" type="video/mp4">
    </video>
  </div>

  <div class="video-controls">
    <button id="playBtn" class="btn btn-warning btn-sm px-4 me-3">Play</button>
    <button id="pauseBtn" class="btn btn-danger btn-sm px-4">Pause</button>
  </div>

  <div class="container mb-5">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        แบบฟอร์มลงทะเบียน
      </div>
      <div class="card-body">
        <form>
          <div class="mb-3">
            <label class="form-label d-block">เพศ</label>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="gender" id="male" value="male">
              <label class="form-check-label" for="male">ชาย</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="gender" id="female" value="female">
              <label class="form-check-label" for="female">หญิง</label>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label d-block">ตำแหน่ง</label>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" id="web" value="web">
              <label class="form-check-label" for="web">Web Development</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" id="mobile" value="mobile">
              <label class="form-check-label" for="mobile">Mobile App</label>
            </div>
          </div>

          <div class="mt-4">
            <button type="submit" class="btn btn-success">ลงทะเบียน</button>
            <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const video = document.getElementById("myVideo");
      const playBtn = document.getElementById("playBtn");
      const pauseBtn = document.getElementById("pauseBtn");

      playBtn.addEventListener("click", function() {
        video.play();
      });

      pauseBtn.addEventListener("click", function() {
        video.pause();
      });
    });
  </script>
</body>

</html>
